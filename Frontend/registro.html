<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GroupWallet</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        if (localStorage.getItem('usuarioId')) {
            const pendingJoin = localStorage.getItem('pendingJoinToken');
            window.location.href = pendingJoin ? 'join.html?token=' + pendingJoin : 'dashboard.html';
        }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body class="login-body">
    <div class="login-container card">
        <div style="text-align: left; margin-bottom: -1rem; position: relative; z-index: 10;">
            <a href="index.html" class="back-link">
                &larr; Volver al inicio
            </a>
        </div>
        <div class="logo text-center">
        <a href="index.html">
            <img src="Placeholders/LogoIndex.png" alt="GroupWallet" class="logo-index">
        </a>
        </div>
        <h2 class="text-center mt-2">Crear Cuenta</h2>
        <form id="form-register" class="mt-2">
            <div class="form-group">
                <label for="registro-nombre" style="font-weight: bold; margin-bottom: 0.5rem; display: block;">Nombre y Apellido</label>
                <input type="text" id="registro-nombre" placeholder="Ej. Juan Pérez" required style="width: 100%; padding: 0.8rem; font-size: 1.05rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light);">
            </div>
            <div class="form-group">
                <label for="registro-correo" style="font-weight: bold; margin-bottom: 0.5rem; display: block;">Correo Electrónico</label>
                <input type="email" id="registro-correo" placeholder="tu@correo.com" required style="width: 100%; padding: 0.8rem; font-size: 1.05rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light);">
            </div>
            <div class="form-group">
                <label for="registro-telefono" style="font-weight: bold; margin-bottom: 0.5rem; display: block;">Teléfono <span style="font-weight: normal; color: var(--text-muted);">(Opcional y Encriptado)</span></label>
                <input type="text" id="registro-telefono" placeholder="Ej. +56912345678" style="width: 100%; padding: 0.8rem; font-size: 1.05rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light);">
            </div>
            <div class="form-group">
                <label for="registro-password" style="font-weight: bold; margin-bottom: 0.5rem; display: block;">Contraseña</label>
                <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                    <input type="password" id="registro-password" placeholder="********" required style="flex: 1; padding: 0.8rem; font-size: 1.05rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light);">
                    <button type="button" class="toggle-password" style="background-color: var(--bg-light); border: 1px solid var(--border-color); border-radius: 6px; padding: 0 1rem; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;" title="Mostrar/Ocultar">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="registro-password-confirm" style="font-weight: bold; margin-bottom: 0.5rem; display: block;">Confirmar Contraseña</label>
                <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                    <input type="password" id="registro-password-confirm" placeholder="Repite tu contraseña" required style="flex: 1; padding: 0.8rem; font-size: 1.05rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light);">
                    <button type="button" class="toggle-password" style="background-color: var(--bg-light); border: 1px solid var(--border-color); border-radius: 6px; padding: 0 1rem; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;" title="Mostrar/Ocultar">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-primary mt-2">Registrarse</button>
        </form>
        <p class="text-center mt-2" style="font-size: 0.9rem;">
            ¿Ya tienes cuenta? <a href="login.html" style="color: var(--secondary-emerald); font-weight: bold;">Inicia Sesión</a>
        </p>
    </div>

    <!-- Modal de Verificación de Teléfono -->
    <div id="modal-verificacion-telefono" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10000; padding: 1rem;">
        <div class="card" style="max-width: 400px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h3 style="margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">📱 Verificar Teléfono</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;">Hemos enviado un código de 6 dígitos a tu número. Ingrésalo para completar tu registro.</p>
            <form id="form-verificacion-telefono">
                <input type="number" id="codigo-verificacion" placeholder="_ _ _ _ _ _" required style="width: 100%; padding: 0.8rem; font-size: 1.5rem; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background-color: var(--bg-light); text-align: center; letter-spacing: 0.5em;">
                <button type="submit" class="btn-primary mt-2" style="background-color: var(--secondary-emerald);">Verificar y Finalizar</button>
            </form>
            <p style="text-align: center; font-size: 0.8rem; margin-top: 1rem; color: var(--text-muted);">
                ¿No recibiste el código? <a href="#" id="btn-reenviar-codigo" style="color: var(--secondary-emerald); font-weight: bold;">Reenviar código</a>
            </p>
        </div>
    </div>

    <script src="toast.js"></script>
    <script src="registro.js"></script>
</body>
</html>
